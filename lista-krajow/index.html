<!DOCTYPE html>
<html lang="pl-PL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
  <link rel="stylesheet" href="/src/css/style.css">
  <link rel="stylesheet" href="/src/css/screen.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.1/css/all.css">
  <script defer src="/src/js/theme.js"></script>
  <script defer src="/src/js/constants.js"></script>
  <script defer src="/src/js/countries.js"></script>
  <script defer src="/src/js/pagination.js"></script>
  <script defer src="/src/js/country_list.js"></script>
  <title>Kantor Sknerusa McKwacza</title>
</head>
<body>
  <header>
    <a class="img-container" href="/"><img src="/assets/images/sknerus.png" alt="logotyp"></a>
    <nav class="nav-desktop f-comic f-big">
        <!--<a class="nav-link-container" href="/"><span>Strona główna</span></a>-->
        <a class="nav-link-container" href="/kalkulator"><span>Kalkulator podróży</span></a>
        <a class="nav-link-container" href="/lista-krajow"><span>Listy Krajów</span></a>
    </nav>
    <div class="space"></div>
    <a class="img-container" href="javascript:void(0)" onclick="switchTheme()"><img id="theme-icon" src="/assets/images/theme-light.webp" alt="motyw strony"></a>
    <input type="checkbox" id="nav-check">
    <label for="nav-check" class="nav-button">
      <i class="fas fa-bars"></i>
    </label>
    <nav class="nav-mobile f-comic f-big">
        <!--<a href="/">Strona główna</a>-->
        <a href="/kalkulator">Kalkulator podróży</a>
        <a href="/lista-krajow">Listy Krajów</a>
    </nav>
  </header>

  <main>
    <section id="list-section">
      <h1>Lista krajów</h1>
      <ul id="country-list">
      </ul>
    </section>
    <section id="country-details" hidden>
      <button type="button" class="exit-button f-note" onclick="hideCountry()">x</button>
      <article>
        <h2 id="country-name"></h2>
        <table>
          <tbody>
            <tr>
              <td rowspan="3" colspan="3">
                <img id="flag-img">
              </td>
              <th>Stolica</th>
              <td id="capital"></td>
            </tr>
            <tr>
              <th>Powierzchnia</th>
              <td id="area"></td>
            </tr>
            <tr>
              <th>Populacja</th>
              <td id="population"></td>
            </tr>
            <tr>
              <td rowspan="3">
                <details id="borders">
                  <summary>Kraje graniczące</summary>
                </details>
              </td>
              <td rowspan="3">
                <details id="languages">
                  <summary>Języki</summary>
                </details>
              </td>
              <td rowspan="3">
                <details id="dt-currencies">
                  <summary>Waluty</summary>
                </details>
              </td>
              <th>Kontynenty</th>
              <td id="continents">-</td>
            </tr>
            <tr>
              <th>Strefy czasowe</th>
              <td id="timezones"></td>
            </tr>
            <tr>
              <th>Ruch drogowy</th>
              <td id="road-side"></td>
            </tr>
          </tbody>
        </table>
        <a id="map-link" href="https://www.openstreetmap.org">Link do mapy</a>
      </article>
    </section>
    <nav aria-label="pagination" class="pagination-container">
      <ul id="page-list" class="pagination">
        <li>
          <a href="#" onclick="prevPage()">
            <span aria-hidden="true">&laquo;</span>
            <span class="visuallyhidden">poprzednia strona</span>
          </a>
        </li>
        <li>
          <a href="#" onclick="nextPage()">
            <span class="visuallyhidden">następna strona</span>
            <span aria-hidden="true">&raquo;</span>
          </a>
        </li>
      </ul>
    </nav>
  </main>

  <footer>

  </footer>

</body>
</html>
