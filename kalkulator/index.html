<!DOCTYPE html>
<html lang="pl-PL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/src/css/style.css">
  <script defer src="/src/js/constants.js"></script>
  <script defer src="/src/js/countries.js"></script>
  <script defer src="/src/js/currencies.js"></script>
  <script defer src="/src/js/calculator.js"></script>
  <title>Kantor Sknerusa McKwacza</title>
</head>
<body>
  <header>
    <img src="" alt="logotyp">
    <nav>
        <a href="/">Strona główna</a>
        <a href="/kalkulator">Kalkulator podróży</a>
        <a href="#">Listy Krajow</a>
    </nav>
  </header>

  <main>
    <section>
      <h1>Kalkulator podróży</h1>
      <table id="expenses-table">
        <thead>
          <tr>
            <th>Nr</th>
            <th>Kraj</th>
            <th>Nazwa Wydatku</th>
            <th>Koszt</th>
            <th>Waluta</th>
          </tr>
        </thead>
        <tbody id="expenses-table-body">
        </tbody>
        <tfoot>
          <tr id="new-expense" hidden>
            <th colspan="5">
              <form id="expense-form" method="post">
                <select id="country" name="country" required>
                  <option value="">--Wybierz Kraj--</option>
                </select>
                <input type="text" id="name" name="name" placeholder="Nazwa Wydatku" required>
                <input type="number" id="value" name="value" placeholder="Koszt Wydatku" required>
                <input type="text" name="currencyName" id="currencyName" value="-" disabled></input>
                <input type="text" name="currencySymbol" id="currencySymbol" value="" disabled hidden></input>
                <input type="text" name="currencyCode" id="currencyCode" value="-" disabled hidden></input>

                <button type="submit">Dodaj</button>
              </form>
            </th>
          </tr>
          <tr>
            <th><button id="add-new-expense" onclick="showExpenseForm()">+</button></th>
            <th>Suma wydatków</th>
            <th id="sum-value" colspan="2">0</th>
            <th>
              <select id="currency" name="currency" required>
                    <option value="PLN">polski złoty</option>
              </select>
            </th>
          </tr>
        </tfoot>
      </table>
    </section>
  </main>

  <footer>

  </footer>

</body>
</html>
