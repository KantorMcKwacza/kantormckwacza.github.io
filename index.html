    <a class="img-container" href="/"><img src="/assets/images/sknerus.png" alt="logotyp"></a>

  <main>
    <section>
      <h1>Kalkulator podróży</h1>
      <form id="calc-form">
        <label for="amount"></label>

        <select id="origin" name="origin" required>
          <option value="">--Wyierz Kraj--</option>
        </select>
        <input type="number" id="amount" name="amount" required>

        <button type="button" onclick="switchOriginTarget()">Zamień</button>

        <select id="target" name="target" required>
          <option value="">--Wyierz Kraj--</option>
        </select>
        <output id="result" name="result" for="amount">
      </form>
    </section>
  </main>
