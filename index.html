<!DOCTYPE html>
<html lang="pl-PL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
  <link rel="stylesheet" href="/src/css/style.css">
  <link rel="stylesheet" href="/src/css/calculator.css">
  <link rel="stylesheet" href="/src/css/exchange.css">
  <link rel="stylesheet" href="/src/css/screen.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.1/css/all.css">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=swap_horiz" />
  <script defer src="/src/js/theme.js"></script>
  <script defer src="/src/js/constants.js"></script>
  <script defer src="/src/js/countries.js"></script>
  <script defer src="/src/js/exchange.js"></script>
  <script defer src="/src/js/currencies.js"></script>
  <title>Kantor Sknerusa McKwacza</title>
</head>
<body>
  <header>
    <a class="img-container" href="/"><img src="/assets/images/sknerus.png" alt="logotyp"></a>
    <nav class="nav-desktop f-comic f-big">
        <!--<a class="nav-link-container" href="/"><span>Strona główna</span></a>-->
        <a class="nav-link-container" href="/kalkulator"><span>Kalkulator podróży</span></a>
        <a class="nav-link-container" href="/lista-krajow"><span>Listy Krajów</span></a>
    </nav>
    <div class="space"></div>
    <a class="img-container" href="javascript:void(0)" onclick="switchTheme()"><img id="theme-icon" src="/assets/images/theme-light.webp" alt="motyw strony"></a>
    <input type="checkbox" id="nav-check">
    <label for="nav-check" class="nav-button">
      <i class="fas fa-bars"></i>
    </label>
    <nav class="nav-mobile f-comic f-big">
        <!--<a href="/">Strona główna</a>-->
        <a href="/kalkulator">Kalkulator podróży</a>
        <a href="/lista-krajow">Listy Krajów</a>
    </nav>
  </header>

  <main>
    <section>
      <form id="calc-form" class="main-form">
        <h1 class="form-h1">Przelicznik walut</h1>
  
        <div class="input-group">
          <label for="amount" style="display:none;">Kwota</label>
          <input type="number" id="amount" name="amount" class="top-input" placeholder="Wpisz kwotę" required>
          <select id="origin" name="origin" required>
            <option value="">--Wybierz Kraj--</option>
          </select>
        </div>
  
        <button type="submit" class="change"><span class="material-symbols-outlined">swap_horiz</span></button>
  
        <div class="input-group">
          <output id="result" name="result" for="amount" class="bottom-input">0.00</output>
          <select id="target" name="target" required>
            <option value="">--Wybierz Kraj--</option>
          </select>
        </div>
  
      </form>
    </section>
  </main>

  <footer>

  </footer>
  
</body>
</html>
